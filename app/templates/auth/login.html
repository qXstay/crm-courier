{% extends "base.html" %}

{% block title %}Вход — Courier CRM{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-6 col-lg-4">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <div class="login-brand">
          <div class="login-logo"></div>
          <div class="login-brand-title">Courier CRM</div>
          <div class="login-brand-sub">Заявки, статусы и оплата</div>
        </div>

        {% if demo_mode %}
          <div class="login-primary">
            <form method="post" action="/demo-login/manager">
              <button class="btn btn-primary login-showcase-btn w-100" type="submit">Открыть CRM</button>
            </form>
            <form method="post" action="/demo-login/courier">
              <button class="login-link-btn" type="submit">Открыть кабинет курьера</button>
            </form>
          </div>

          <details class="login-password"{% if error %} open{% endif %}>
            <summary>Вход по паролю</summary>
            {% if error %}
              <div class="alert alert-danger" role="alert">{{ error }}</div>
            {% endif %}
            <form method="post" action="/login">
              <div class="mb-3">
                <label class="form-label" for="email">Логин</label>
                <input class="form-control" id="email" name="email" type="text" value="{{ email }}" autocomplete="username">
              </div>
              <div class="mb-3">
                <label class="form-label" for="password">Пароль</label>
                <input class="form-control" id="password" name="password" type="password" autocomplete="current-password">
              </div>
              <button class="btn btn-primary w-100" type="submit">Войти</button>
            </form>
          </details>
        {% else %}
          <h1 class="h3 mb-3">Вход</h1>
          {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
          {% endif %}
          <form method="post" action="/login">
            <div class="mb-3">
              <label class="form-label" for="email">Логин</label>
              <input class="form-control" id="email" name="email" type="text" value="{{ email }}" autocomplete="username" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label" for="password">Пароль</label>
              <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Войти</button>
          </form>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
